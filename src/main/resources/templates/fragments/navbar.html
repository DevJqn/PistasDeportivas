<!-- templates/fragments/navbar.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/web/home}">🏟️ Pistas Deportivas</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/web/pistas}">Pistas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/web/reservas}">Mis Reservas</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/web/usuarios}">Usuarios</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/web/reservas/ingresos}">Ingresos</a>
                </li>
            </ul>
            <ul class="navbar-nav align-items-center">
                <li class="nav-item me-2">
                    <span class="text-white-50 small">
                        <sec:authentication property="name"/>
                        <span sec:authorize="hasRole('ADMIN')"
                              class="badge bg-warning text-dark ms-1">ADMIN</span>
                    </span>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="mb-0">
                        <button class="btn btn-outline-light btn-sm">Salir</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>
</body>
</html>
