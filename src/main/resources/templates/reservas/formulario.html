<!-- templates/reservas/formulario.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Reserva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4" style="max-width:520px">
    <h4>Nueva Reserva</h4>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Precio informativo -->
    <div class="alert alert-info mb-3">
        <strong>Tarifas:</strong> Tarifa valle (lun-vie 08-17h): <strong>8 €/h</strong> ·
        Tarifa pico (lun-vie 17-22h y fin de semana): <strong>15 €/h</strong>
    </div>

    <form th:action="@{/web/reservas/nueva}" th:object="${dto}" method="post">

        <div class="mb-3">
            <label class="form-label">Pista</label>
            <select th:field="*{pistaId}" class="form-select"
                    th:classappend="${#fields.hasErrors('pistaId')} ? 'is-invalid'">
                <option value="">-- Selecciona pista --</option>
                <option th:each="p : ${pistas}"
                        th:value="${p.id}"
                        th:text="${p.nombre} + ' (' + ${p.tipo} + ') - ' + ${p.ubicacion}">
                </option>
            </select>
            <div class="invalid-feedback" th:errors="*{pistaId}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha</label>
            <input type="date" th:field="*{fecha}" class="form-control"
                   th:classappend="${#fields.hasErrors('fecha')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{fecha}"></div>
        </div>

        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Hora inicio</label>
                <input type="time" th:field="*{horaInicio}" class="form-control"
                       th:classappend="${#fields.hasErrors('horaInicio')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{horaInicio}"></div>
            </div>
            <div class="col mb-3">
                <label class="form-label">Hora fin</label>
                <input type="time" th:field="*{horaFin}" class="form-control"
                       th:classappend="${#fields.hasErrors('horaFin')} ? 'is-invalid'">
                <div class="invalid-feedback" th:errors="*{horaFin}"></div>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Reservar</button>
            <a th:href="@{/web/reservas}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
