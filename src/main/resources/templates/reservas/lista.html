<!-- templates/reservas/lista.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 th:text="${esAdmin} ? 'Todas las reservas' : 'Mis reservas'">Reservas</h3>
        <a th:href="@{/web/reservas/nueva}" class="btn btn-success btn-sm">+ Nueva reserva</a>
    </div>

    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>
    <div th:if="${error}"  class="alert alert-danger"  th:text="${error}"></div>

    <table class="table table-hover">
        <thead class="table-dark">
            <tr>
                <th>Pista</th><th>Fecha</th><th>Horario</th><th>Precio</th>
                <th>Estado</th>
                <th th:if="${esAdmin}">Usuario</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="r : ${reservas}"
                th:classappend="${r.estado == 'CANCELADA'} ? 'table-secondary'">
                <td>
                    <strong th:text="${r.pistaNombre}"></strong>
                    <small class="text-muted d-block" th:text="${r.tipoPista}"></small>
                </td>
                <td th:text="${r.fecha}"></td>
                <td th:text="${r.horaInicio} + ' - ' + ${r.horaFin}"></td>
                <td th:text="${#numbers.formatDecimal(r.precio,1,2)} + ' €'"></td>
                <td>
                    <span th:text="${r.estado}"
                          th:classappend="${r.estado == 'ACTIVA'}
                              ? 'badge bg-success' : 'badge bg-secondary'">
                    </span>
                </td>
                <td th:if="${esAdmin}" th:text="${r.usuarioNombre}"></td>
                <td>
                    <form th:if="${r.estado == 'ACTIVA'}"
                          th:action="@{/web/reservas/cancelar/{id}(id=${r.id})}"
                          method="post"
                          onsubmit="return confirm('¿Cancelar esta reserva?')">
                        <button class="btn btn-outline-danger btn-sm">Cancelar</button>
                    </form>
                    <span th:if="${r.estado == 'CANCELADA' && r.reembolso != null}"
                          class="text-muted small"
                          th:text="'Reembolso: ' + ${#numbers.formatDecimal(r.reembolso,1,2)} + ' €'">
                    </span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(reservas)}">
                <td colspan="7" class="text-center text-muted">No hay reservas</td>
            </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
