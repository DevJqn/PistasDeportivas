<!-- templates/login.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Pistas Deportivas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow" style="width: 400px">
        <div class="card-body p-4">
            <h4 class="card-title text-center mb-4">🏟️ Pistas Deportivas</h4>

            <div th:if="${param.error}" class="alert alert-danger">
                Email o contraseña incorrectos.
            </div>
            <div th:if="${param.logout}" class="alert alert-info">
                Has cerrado sesión.
            </div>
            <div th:if="${param.registrado}" class="alert alert-success">
                Cuenta creada. Ya puedes iniciar sesión.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="username" class="form-control"
                           placeholder="tu@email.com" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Entrar</button>
            </form>

            <hr>
            <p class="text-center mb-0">
                ¿Sin cuenta? <a th:href="@{/registro}">Regístrate</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
