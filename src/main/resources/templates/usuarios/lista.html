<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">

<head>
    <meta charset="UTF-8">
    <title>Usuarios</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <!-- Buscador -->
    <form th:action="@{/web/usuarios}" method="get"
          class="d-flex mb-3 gap-2">

        <input type="text"
               name="nombre"
               class="form-control"
               style="max-width:300px"
               placeholder="Buscar usuario..."
               th:value="${busqueda}">

        <button class="btn btn-outline-primary">
            Buscar
        </button>

        <a th:href="@{/web/usuarios}"
           class="btn btn-outline-secondary">

            Limpiar

        </a>
    </form>

    <!-- Flash messages -->
    <div th:if="${exito}"
         class="alert alert-success"
         th:text="${exito}">
    </div>

    <div th:if="${error}"
         class="alert alert-danger"
         th:text="${error}">
    </div>

    <table class="table table-striped table-hover">

        <thead class="table-dark">

        <tr>
            <th>#</th>
            <th>Nombre</th>
            <th>Teléfono</th>
            <th>Email</th>
            <th>Rol</th>

            <th sec:authorize="hasRole('ADMIN')">
                Acciones
            </th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="u : ${usuarios}">

            <td th:text="${u.id}"></td>
            <td th:text="${u.nombre}"></td>
            <td th:text="${u.telefono}"></td>
            <td th:text="${u.email}"></td>

            <td>
                <span class="badge bg-info text-dark"
                      th:text="${u.rol}">
                </span>
            </td>

            <td sec:authorize="hasRole('ADMIN')">

                <a th:href="@{/web/usuarios/editar/{id}(id=${u.id})}"
                   class="btn btn-warning btn-sm">

                    Editar

                </a>

                <form th:action="@{/web/usuarios/eliminar/{id}(id=${u.id})}"
                      method="post"
                      class="d-inline"
                      onsubmit="return confirm('¿Eliminar este usuario?')">

                    <button class="btn btn-danger btn-sm">
                        Eliminar
                    </button>

                </form>

            </td>

        </tr>

        <tr th:if="${#lists.isEmpty(usuarios)}">

            <td colspan="6"
                class="text-center text-muted">

                No hay usuarios registrados

            </td>

        </tr>

        </tbody>

    </table>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
