<!-- templates/home.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Pistas Deportivas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">
    <h2>Bienvenido/a, <span sec:authentication="name"></span></h2>
    <div class="row mt-4 g-3">
        <div class="col-md-4">
            <div class="card text-center shadow-sm h-100">
                <div class="card-body">
                    <h5>🎾 Ver Pistas</h5>
                    <p class="text-muted">Consulta el catálogo de pistas disponibles</p>
                    <a th:href="@{/web/pistas}" class="btn btn-primary">Ver pistas</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center shadow-sm h-100">
                <div class="card-body">
                    <h5>📅 Nueva Reserva</h5>
                    <p class="text-muted">Reserva una pista para tu fecha</p>
                    <a th:href="@{/web/reservas/nueva}" class="btn btn-success">Reservar</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center shadow-sm h-100">
                <div class="card-body">
                    <h5>📋 Mis Reservas</h5>
                    <p class="text-muted">Consulta y gestiona tus reservas</p>
                    <a th:href="@{/web/reservas}" class="btn btn-secondary">Ver reservas</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
